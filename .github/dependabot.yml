version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      typescript-tooling:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "eslint*"
          - "prettier"
          - "vitest"
      runtime-deps:
        patterns:
          - "@modelcontextprotocol/sdk"
          - "chokidar"
          - "open"
          - "yaml"
          - "zod"
    # vitest 4 requires vite 6; bumping the pair must happen together as
    # a deliberate step. eslint 10 follows the same pattern. Skip major
    # bumps for these until the pairing is handled manually.
    ignore:
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
