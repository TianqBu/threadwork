name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Node 22+ only: node:sqlite is experimental in 22.5+ and stable
        # in 24.x. Node 20 throws ERR_UNKNOWN_BUILTIN_MODULE on import.
        node: ["22", "24"]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build before Typecheck and Lint: packages/cli imports
      # `threadwork-replay-ui` as a workspace dep, and its dist/*.d.ts is
      # produced by the build step. Without this order tsc fails with
      # TS2307 on a clean checkout.
      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: License check
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: pnpm run license-check

      - name: Publish dry-run (cli)
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: pnpm --filter threadwork-cli publish --dry-run --no-git-checks

      - name: Demo gif size gate
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        run: pnpm run bench:gif-check
